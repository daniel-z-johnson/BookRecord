services:
  postgres:
    image: postgres:18.3
    container_name: bookrecord-postgres
    environment:
      POSTGRES_USER: books
      POSTGRES_PASSWORD: postgress
      POSTGRES_DB: books
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U books -d books"]
      interval: 5s
      timeout: 5s
      retries: 10

